<!DOCTYPE html>
<html>
<head>
  <title>SwethaElara Jewels</title>
  <link rel="stylesheet" href="style.css">

  <!-- LOGO -->
  <link rel="icon" href="logo.jpeg">
</head>
<body>

<header class="header">
  <div class="logo-container">
    <img src="logo-250x80.png" class="logo">
  </div>

  <nav>
    <a href="#home">Home</a>
    <a href="#products">Shop</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h2>Elegance Redefined</h2>
  <p>Discover Premium Jewelry Collection</p>
</section>

<!-- FILTER -->
<div class="filters">
  <button onclick="filterProducts('All')">All</button>
  <button onclick="filterProducts('Earrings')">Earrings</button>
  <button onclick="filterProducts('Pendants')">Pendants</button>
  <button onclick="filterProducts('Rings')">Rings</button>
  <button onclick="filterProducts('Necklaces')">Necklaces</button>
</div>

<!-- PRODUCTS -->
<section id="products" class="products"></section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact Us</h2>
  <p>Swetha m</p>
  <p>📞 8998989898</p>
  <p>📧 swetha@gmail.com</p>
</section>

<!-- FOOTER -->
<footer class="footer">
  <h2>SwethaElara</h2>
  <p>Luxury Jewelry Brand</p>
</footer>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()">✖</span>
    <img id="modal-img">
    <h3 id="modal-name"></h3>
    <p id="modal-price"></p>
    <p id="modal-desc"></p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>
</div>

<!-- CART -->
<div id="cart" class="cart">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <h3 id="total"></h3>
  <button onclick="payNow()">Pay Now</button>
</div>

<script src="script.js"></script>
</body>
</html>
